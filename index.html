<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReturnQR</title>
    <!-- Google Fonts for Apple-like typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>

<body>
    <main class="container">
        <div class="header">
            <h1>ReturnQR</h1>
            <p>この持ち物の持ち主に匿名で連絡できます</p>
        </div>

        <form id="contact-form">
            <div class="form-group">
                <textarea id="message" name="message" placeholder="拾った場所や状況などを入力してください..." required></textarea>
            </div>

            <label class="checkbox-container">
                <input type="checkbox" id="send-location" name="send-location">
                <span class="checkmark"></span>
                <span class="checkbox-label">位置情報を一緒に送る</span>
            </label>

            <button type="submit" id="submit-btn">送信</button>
        </form><br><br>
        <a href="https://junic215.github.io/" 
           style="color:#000000 !important; text-decoration:underline;">
           ReturnQR
        </a>

        <!-- Status message container -->
        <div id="status-message" class="hidden"></div>
    </main>

    <script src="script.js"></script>
</body>

</html>
